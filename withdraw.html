<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - Premium</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #00ffc8;
            --header-bg: #00bcd4;
            --text-dim: #94a3b8;
            --error: #ff4757;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Lüks Header */
        .header {
            padding: 20px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .back-btn {
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.2s;
        }

        .back-btn:hover { transform: scale(1.1); }

        /* Ana Kart */
        .card {
            margin: 20px;
            padding: 25px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .balance-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            display: block;
        }

        .balance-amount {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: 5px;
        }

        /* Network Seçimi */
        .section-title {
            margin: 15px 0;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .network-item {
            background: #334155;
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .network-item.active {
            border-color: var(--accent);
            background: rgba(0, 255, 200, 0.1);
            color: var(--accent);
        }

        /* Inputlar */
        .input-group {
            display: none; /* İlk başta gizli */
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--header-bg);
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.2);
        }

        /* Onay Butonu */
        .confirm-btn {
            margin-top: 25px;
            padding: 16px;
            background: var(--accent);
            color: #0f172a;
            text-align: center;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .confirm-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* Mesaj Alanı */
        .status-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .error-style { background: rgba(255, 71, 87, 0.1); color: var(--error); display: block; }
        .success-style { background: rgba(0, 255, 200, 0.1); color: var(--accent); display: block; }
    </style>
</head>
<body>

<div class="header">
    <span class="back-btn" onclick="history.back()">←</span>
    <span id="title">Withdraw</span>
</div>

<div class="card">
    <div class="balance-section">
        <span id="balLabel" class="balance-label">Total Balance</span>
        <div id="balanceText" class="balance-amount">0.00 USDT</div>
    </div>

    <div class="section-title" id="methodTitle">Withdrawal Method</div>
    <div class="network-grid">
        <div class="network-item" onclick="selectNetwork(this, 'USDT-TRC20')">USDT-TRC20</div>
        <div class="network-item" onclick="selectNetwork(this, 'USDT-BEP20')">USDT-BEP20</div>
        <div class="network-item" onclick="selectNetwork(this, 'USDT-ERC20')">USDT-ERC20</div>
    </div>

    <div id="inputGroup" class="input-group">
        <input type="number" id="amount" class="input-field" placeholder="1.000 - ...">
        <input type="text" id="address" class="input-field" placeholder="Withdrawal Address">
        <input type="password" id="password" class="input-field" placeholder="Password">
        
        <div class="confirm-btn" id="confirmBtn" onclick="processWithdraw()">Confirm</div>
    </div>

    <div id="statusBox" class="status-msg"></div>
</div>

<script src="common.js"></script>
<script>
    const API = "https://swerrrrr.onrender.com";
    let userData = null;
    let selectedNet = "";

    const translations = {
    tr: {
        title: "Para Çekme",
        balLabel: "Toplam Bakiye",
        method: "Çekim Yöntemi",
        addrPlaceholder: "Çekim Adresi",
        passPlaceholder: "Şifre",
        confirm: "ONAYLA",
        errFill: "Lütfen tüm alanları doldurun",
        errPass: "Şifre yanlış!",
        errNoMoney: "Bakiyenizde hiç para yok",

        // 🔥 تم التعديل
        errDays: "9 gün tamamlaman gerekiyor",

        errInvite: "Paranızı çekebilmek için en az 1 kişiyi davet etmeniz gerekmektedir",
        success: "İşlem başarıyla başlatıldı"
    },

    en: {
        title: "Withdraw",
        balLabel: "Total Balance",
        method: "Withdrawal Method",
        addrPlaceholder: "Withdrawal Address",
        passPlaceholder: "Password",
        confirm: "CONFIRM",
        errFill: "Please fill all fields",
        errPass: "Incorrect password!",
        errNoMoney: "You don't have any funds",

        // 🔥 تم التعديل
        errDays: "You must complete 9 days",

        errInvite: "You must invite at least 1 person to withdraw your money",
        success: "Process started successfully"
    },

    ar: {
        title: "سحب",
        balLabel: "الرصيد الإجمالي",
        method: "طريقة السحب",
        addrPlaceholder: "عنوان السحب",
        passPlaceholder: "كلمة المرور",
        confirm: "يتاكد",
        errFill: "يرجى ملء جميع الحقول",
        errPass: "كلمة المرور خاطئة!",
        errNoMoney: "ليس لديك أي أموال",

        // 🔥 تم التعديل
        errDays: "يجب عليك اكمال 9 ايام",

        errInvite: "يجب عليك دعوة شخص واحد على الأقل لسحب أموالك",
        success: "تمت العملية بنجاح"
    }
};
    window.addEventListener("load", async () => {
    let userId = localStorage.getItem("userId");
    if(!userId) return showStatus("Login required", true);

    try {
        let res = await fetch(API + "/user/" + userId);
        userData = await res.json();

        // 🔥 عرض البيانات في الكونسول (عشان نشوف المشكلة)
        console.log("USER DATA:", userData);
        console.log("RAW DAYS:", userData.days);

        // 🔥 تنظيف قيمة الأيام (يشيل Ay أو أي نص)
        let rawDays = String(userData.days);
        userData.days = parseInt(rawDays.replace(/[^0-9]/g, "")) || 0;

        // 🔥 تأكيد بعد التنظيف
        console.log("CLEAN DAYS:", userData.days);

        updateUI();

    } catch(e) {
        showStatus("Server error", true);
    }
});

    function updateUI() {
        if(!userData) return;
        const lang = getLang();
        const t = translations[lang];

        // Metinleri Güncelle
        document.getElementById("title").innerText = t.title;
        document.getElementById("balLabel").innerText = t.balLabel;
        document.getElementById("methodTitle").innerText = t.method;
        document.getElementById("address").placeholder = t.addrPlaceholder;
        document.getElementById("password").placeholder = t.passPlaceholder;
        document.getElementById("confirmBtn").innerText = t.confirm;
        document.getElementById("balanceText").innerText = (userData.balance || 0) + " USDT";
    }

    function selectNetwork(el, net) {
        selectedNet = net;
        // Görsel Seçim
        document.querySelectorAll('.network-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        // Inputları Göster
        document.getElementById("inputGroup").style.display = "flex";
    }

    function showStatus(msg, isError) {
    const box = document.getElementById("statusBox");

    // 🔥 يمنع أي سكربت ثاني يغيره
    box.innerText = msg;

    setTimeout(() => {
        box.innerText = msg;
    }, 50);

    box.className = "status-msg " + (isError ? "error-style" : "success-style");
}

    function processWithdraw() {
        const lang = getLang();
        const t = translations[lang];
        
        const amount = document.getElementById("amount").value;
        const address = document.getElementById("address").value;
        const password = document.getElementById("password").value;

        // 1. Boş Alan Kontrolü
        if(!amount || !address || !password) {
            return showStatus(t.errFill, true);
        }

        // 2. Şifre Kontrolü
        if(password !== userData.password) {
            return showStatus(t.errPass, true);
        }

        // 3. Bakiye Kontrolü
        if(!userData.balance || userData.balance <= 0) {
            return showStatus(t.errNoMoney, true);
        }

        // 4. 9 Gün Kontrolü
        let days = parseInt(userData.days) || 0;
let remaining = 9 - days;

if(days < 9){

    let msg = "";

    if(lang === "tr"){
        msg = remaining + " gün tamamlaman gerekiyor";
    }
    else if(lang === "en"){
        msg = "You must complete " + remaining + " days";
    }
    else{
        msg = "\u202Bيجب عليك اكمال " + remaining + " ايام\u202C";
    }

    return showStatus(msg, true);
}

        // 5. Davet Kontrolü (9 gün tamamsa buraya geçer)
        if(!userData.invitedCount || userData.invitedCount < 1) {
            return showStatus(t.errInvite, true);
        }

        // Hepsi Tamamsa
        showStatus(t.success, false);
    }

    // common.js'den dil fonksiyonunu simüle et (eğer yoksa)
    function getLang() {
        return localStorage.getItem("lang") || "en";
    }
</script>

</body>
</html>
