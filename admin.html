<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

input{
  display:block;
  margin:10px auto;
  padding:12px;
  width:250px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 20px;
  background:orange;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}
</style>
</head>

<body>

<h2>🔧 Admin Panel</h2>

<input id="password" placeholder="Admin Key">
<input id="uid" placeholder="Kullanıcı ID">
<input id="amount" placeholder="Miktar">

<button onclick="addBalance()">➕ Para Ekle</button>
<button onclick="removeBalance()">➖ Para Sil</button>
<button onclick="resetTimer()">⏱️ Timer Reset</button>

<script>
const API = "https://swerrrrr.onrender.com";

// 🔐 Admin key al
function getKey(){
  return document.getElementById("password").value;
}

// ➕ PARA EKLE
function addBalance(){
  let id = document.getElementById("uid").value;
  let amount = document.getElementById("amount").value;
  let key = getKey();

  if(!id || !amount || !key){
    alert("❌ Eksik veri!");
    return;
  }

  fetch(API + "/add-balance", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      id: Number(id),
      amount: Number(amount),
      adminKey: key
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert("❌ Hata: " + data.error);
    }else{
      alert("✅ Para eklendi!");
    }
  })
  .catch(()=> alert("❌ Server hatası!"));
}

// ➖ PARA SİL
function removeBalance(){
  let id = document.getElementById("uid").value;
  let amount = document.getElementById("amount").value;
  let key = getKey();

  if(!id || !amount || !key){
    alert("❌ Eksik veri!");
    return;
  }

  fetch(API + "/add-balance", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      id: Number(id),
      amount: -Number(amount),
      adminKey: key
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert("❌ Hata: " + data.error);
    }else{
      alert("✅ Para silindi!");
    }
  })
  .catch(()=> alert("❌ Server hatası!"));
}

// ⏱️ TIMER RESET
function resetTimer(){
  let id = document.getElementById("uid").value;
  let key = getKey();

  if(!id || !key){
    alert("❌ Eksik veri!");
    return;
  }

  fetch(API + "/reset-timer", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      id: Number(id),
      adminKey: key
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert("❌ Hata: " + data.error);
    }else{
      alert("✅ Timer sıfırlandı!");
    }
  })
  .catch(()=> alert("❌ Server hatası!"));
}
</script>

</body>
</html>
