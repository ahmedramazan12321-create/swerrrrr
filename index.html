<style>
 

.lang-btn {
  position: fixed;
  top: 10px;
  right: 10px;

  width: 40px;
  height: 40px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;

  cursor: pointer;

  box-shadow: 0 0 10px rgba(255,200,0,0.6);
}


.lang-menu div {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.lang-menu div:hover {
  background: gold;
  color: black;
}
  .lang-menu {
  display: none;
  position: absolute;
  top: 50px;
  right: 0;
  background: #111827;
  border-radius: 15px;
  padding: 10px;
  width: 160px;
  box-shadow: 0 0 20px rgba(255,200,0,0.5);
}
  
body {

/* Input */

/* Buton */

<script>
  // 1. Kullanıcı listesini ve dili başlat


// 3. Arayüz metinlerini güncelleme fonksiyonu

function submitForm() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  // 🔥 REGISTER
  if (!isLogin) {

    fetch("https://swerrrrr.onrender.com/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    })
    .then(res => res.json())
    .then(data => {

      if (data.error) {
        msg.innerText = data.error;
        msg.style.color = "red";
        return;
      }

      msg.innerText = "Kayıt başarılı! ID: " + data.userId;
      msg.style.color = "lightgreen";

      setTimeout(() => {
        toggleForm();
        msg.innerText = "";
      }, 1500);

    })
    .catch(() => {
      msg.innerText = "Server bağlantı hatası!";
      msg.style.color = "orange";
    });

  }

  // 🔥 LOGIN
  else {

    fetch("https://swerrrrr.onrender.com/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    })
    .then(res => res.json())
    .then(user => {

      if (user.error) {
        msg.innerText = user.error;
        msg.style.color = "red";
        return;
      }

      localStorage.setItem("userId", user.id);

      msg.innerText = "Giriş başarılı!";
      msg.style.color = "lightgreen";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    })
    .catch(() => {
      msg.innerText = "Server bağlantı hatası!";
      msg.style.color = "orange";
    });

  }

}


 
  
  // LOGIN
  
  // 🔐 LOGIN
  // =========================
 
// Dil verilerini genişletiyoruz

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('APP installed');
      } else {
        console.log('Install cancelled');
      }

      deferredPrompt = null;
    });
  }
}
window.location.href = "login.html";
</script>
<script>
function closePage(){
  window.open('', '_self');
  window.close();
}
function toggleLang(){
  document.addEventListener("click", function(e){
  let menu = document.getElementById("langMenu");
  let btn = document.querySelector(".lang-btn");

  if (!menu.contains(e.target) && !btn.contains(e.target)) {
    menu.style.display = "none";
  }
});
  let menu = document.getElementById("langMenu");

  if(menu.style.display === "block"){
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}


let index = 0;
let slides = document.getElementById("slides");
let dots = document.querySelectorAll(".dots span");

function showSlide(i){
  index = i;
  slides.style.transform = "translateX(" + (-i * 100) + "%)";

  dots.forEach(d => d.classList.remove("active"));
  dots[i].classList.add("active");
}

function goSlide(i){
  showSlide(i);
}

setInterval(() => {
  index = (index + 1) % 2;
  showSlide(index);
}, 3000);

showSlide(0)

window.onload = function(){
  let savedLang = localStorage.getItem("lang") || "tr";
  applyLang(savedLang);
}
</script>
