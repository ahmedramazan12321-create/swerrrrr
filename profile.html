<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0a1f44, #000);
  color: white;
}

.top {
  padding: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

.info {
  margin-top: 20px;
}

.box {
  margin: 20px;
  padding: 20px;
  background: gold;
  color: black;
  border-radius: 15px;
  text-align: center;
}

.menu {
  margin: 20px;
}

.item {
  padding: 15px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #020617;
}

.nav-item {
  flex: 1;
  text-align: center;
  color: #aaa;
  padding: 10px;
}

.nav-item.active {
  color: gold;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">
    <img src="https://i.ibb.co/NnY0jXCx/IMG-20240322-WA0000.jpg">
    <h2>DOLAR</h2>
  </div>

  <div class="info">
    <p id="email"></p>
    <p>ID: <span id="userId"></span></p>
  </div>
</div>

<div class="box">
  <p id="balanceText">Toplam bakiye (USDT)</p>
  <h2 id="balance">0</h2>
</div>

<div class="menu">
  <div class="item" onclick="logout()" id="logoutBtn">Çıkış Yap</div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='dashboard.html'">
    <span>🏠</span>
    <p id="nav_home">Ev</p>
  </div>

  <div class="nav-item" onclick="window.location.href='vip.html'">
    <span>👑</span>
    <p id="nav_vip">VIP</p>
  </div>

  <div class="nav-item" onclick="window.location.href='tasks.html'">
    <span>📊</span>
    <p id="nav_task">Görev</p>
  </div>

  <div class="nav-item active">
    <span>👤</span>
    <p id="nav_profile">Ben</p>
  </div>
</div>

<script>
const API = "https://swerrrrr.onrender.com";

// 🌐 ترجمة
const texts = {
  tr: {
    balance: "Toplam bakiye (USDT)",
    logout: "Çıkış Yap",
    nav_home: "Ev",
    nav_vip: "VIP",
    nav_task: "Görev",
    nav_profile: "Ben"
  },
  en: {
    balance: "Total Balance (USDT)",
    logout: "Logout",
    nav_home: "Home",
    nav_vip: "VIP",
    nav_task: "Tasks",
    nav_profile: "Profile"
  },
  ar: {
    balance: "الرصيد الإجمالي",
    logout: "تسجيل الخروج",
    nav_home: "الرئيسية",
    nav_vip: "VIP",
    nav_task: "المهام",
    nav_profile: "حسابي"
  }
};

// 🌐 تطبيق اللغة
function applyLang(){
  let lang = localStorage.getItem("lang") || "tr";
  let t = texts[lang];

  document.getElementById("balanceText").innerText = t.balance;
  document.getElementById("logoutBtn").innerText = t.logout;
  document.getElementById("nav_home").innerText = t.nav_home;
  document.getElementById("nav_vip").innerText = t.nav_vip;
  document.getElementById("nav_task").innerText = t.nav_task;
  document.getElementById("nav_profile").innerText = t.nav_profile;
}

// 👤 جلب البيانات
window.onload = function(){

  applyLang(); // 🔥 مهم جدًا

  let userId = localStorage.getItem("userId");

  if (!userId) {
    alert("Login required");
    window.location.href = "login.html";
    return;
  }

  fetch(API + "/user/" + userId)
    .then(res => res.json())
    .then(user => {

      if(user.error){
        document.getElementById("email").innerText = "Error";
        return;
      }

      document.getElementById("email").innerText = user.email;
      document.getElementById("userId").innerText = user.id;
      document.getElementById("balance").innerText = user.balance;

    })
    .catch(() => {
      document.getElementById("email").innerText = "Server error";
    });
};

// 🚪 خروج
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
