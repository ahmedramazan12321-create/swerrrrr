<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOLAR - Kayıt</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0a1f44,#000814 70%);
  color:white;
  overflow:hidden;
}

/* 🔥 Glow background */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#00f0ff;
  filter:blur(120px);
  opacity:0.15;
  top:-100px;
  left:-100px;
}

/* 🌐 LANGUAGE */
.lang-box{position:fixed;top:15px;right:15px;z-index:999;}
.lang-btn{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,gold,orange);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 0 20px gold,0 0 40px rgba(255,215,0,0.6);
  transition:0.3s;
}
.lang-btn:hover{transform:scale(1.1);}
.lang-menu{
  display:none;
  margin-top:10px;
  background:rgba(0,0,0,0.9);
  border-radius:15px;
  overflow:hidden;
}
.lang-menu div{
  padding:12px;
  cursor:pointer;
  color:white;
  transition:0.2s;
}
.lang-menu div:hover{
  background:gold;
  color:black;
}

/* 💎 CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
  z-index:1;
}

/* 🔥 LOGO */
.logo{
  width:110px;height:110px;border-radius:50%;
  background:url('https://i.ibb.co/NnY0jXCx/IMG-20240322-WA0000.jpg') center/cover;
  margin:auto;
  box-shadow:0 0 25px rgba(0,255,255,0.7),0 0 60px rgba(0,255,255,0.2);
}

/* ✨ TITLE */
.title{
  font-size:34px;
  color:#b6ff00;
  margin:20px 0;
  text-shadow:0 0 15px #b6ff00;
}

/* 💎 CARD */
.card{
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(0,255,200,0.2);
  transition:0.3s;
}
.card:hover{transform:translateY(-5px);}

/* INPUT */
input{
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:15px;
}
input::placeholder{color:#ccc;}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00f0ff,#0072ff);
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00f0ff;
}

/* SWITCH */
.switch{
  margin-top:15px;
  font-size:14px;
  color:#42a5f5;
  cursor:pointer;
}
.switch:hover{text-decoration:underline;}

/* 🔄 LOADER */
#loader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000814;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.spinner{
  width:80px;height:80px;
  border:6px solid rgba(255,255,255,0.1);
  border-top:6px solid #00f0ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 25px #00f0ff;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* 📱 MOBILE */
@media(max-width:600px){
  .title{font-size:28px;}
  .logo{width:90px;height:90px;}
}
</style>
</head>

<body>

<!-- 🌐 LANGUAGE -->
<div class="lang-box">
  <div class="lang-btn" onclick="toggleLang()">🌐</div>
  <div class="lang-menu" id="langMenu">
    <div onclick="setLang('tr')">🇹🇷 Türkçe</div>
    <div onclick="setLang('en')">🇺🇸 English</div>
    <div onclick="setLang('ar')">🇸🇦 العربية</div>
  </div>
</div>

<div class="container">

  <div class="logo"></div>

  <div class="title">DOLAR</div>

  <div class="card">

    <h2 id="title">Kayıt Ol</h2>

    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="password" placeholder="Şifre">

    <button onclick="register()" id="btn">Kayıt Ol</button>

    <p class="switch" onclick="window.location.href='login.html'" id="switch">
      Zaten hesabın var mı? Giriş Yap
    </p>

  </div>

</div>

<!-- 🔄 LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<script src="app.js"></script>

</body>
</html>
